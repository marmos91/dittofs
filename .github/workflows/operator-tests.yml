# Kubernetes Operator Tests for DittoFS
#
# Runs envtest-based unit tests for the DittoFS operator (kubebuilder project).
# Uses controller-runtime's envtest to provide a lightweight K8s API server.

name: Operator Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
    paths:
      - 'k8s/dittofs-operator/**'
      - '.github/workflows/operator-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: k8s/dittofs-operator

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: k8s/dittofs-operator/go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: make test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operator-coverage
          path: k8s/dittofs-operator/cover.out
          retention-days: 7
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: k8s/dittofs-operator/go.mod
          cache: true

      - name: Run linter
        run: make lint

  manifests:
    name: Manifests in sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: k8s/dittofs-operator/go.mod
          cache: true

      # Regenerates CRDs/RBAC/deepcopy from kubebuilder markers, syncs the Helm
      # chart CRDs, and fails on any non-empty git diff so config/crd, api, and
      # chart/crds can never drift from the source markers.
      - name: Verify generated manifests
        run: make manifests-verify

      # The documented "kubectl kustomize config/default | kubectl apply -f -"
      # install path must render from a clean checkout — guards against a
      # kustomization referencing a file that is missing from the repo.
      - name: Verify kustomize build
        run: kubectl kustomize config/default > /dev/null

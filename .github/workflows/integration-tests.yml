name: Integration Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
    paths:
      - 'cmd/**/*.go'
      - 'pkg/**/*.go'
      - 'internal/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/integration/**'
      - '.github/workflows/integration-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.25.x"]

    # PostgreSQL service so the metadata-store integration + conformance
    # suites actually run in CI. The postgres test factory connects to
    # localhost:5432, database dittofs_test, postgres/postgres.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dittofs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true  # Built-in caching (replaces actions/cache)

      - name: Download dependencies
        run: go mod download

      # -p 1 serializes package test binaries: several packages (metadata
      # store conformance, blockstore engine drain) share the single
      # dittofs_test database, and the conformance suite truncates it
      # between subtests — running their binaries concurrently would race.
      - name: Run all integration tests
        env:
          DITTOFS_TEST_POSTGRES_DSN: "host=localhost port=5432 dbname=dittofs_test user=postgres password=postgres sslmode=disable"
        run: go test -tags=integration -v -timeout=20m -p 1 ./...

      - name: Install and start rpcbind
        run: |
          sudo apt-get update
          sudo apt-get install -y rpcbind
          sudo systemctl start rpcbind || sudo rpcbind

      - name: Run portmap system integration tests
        run: |
          # Tests RPC client against system rpcbind
          # Skips automatically if rpcbind unavailable or NFS already registered
          go test -tags=portmap_system -v -timeout=2m ./test/integration/portmap/...

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-${{ matrix.go-version }}
          path: |
            /tmp/dittofs-*
          retention-days: 3
          if-no-files-found: ignore

name: Integration Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
    paths:
      - 'cmd/**/*.go'
      - 'pkg/**/*.go'
      - 'internal/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'test/integration/**'
      - '.github/workflows/integration-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.25.x"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # PostgreSQL for the metadata-store integration + conformance suites.
      # Started as a step-managed container (not a `services:` block) so the
      # image pull can be retried — GitHub Actions cannot retry a service
      # container's pull, and a transient Docker Hub hiccup there fails the
      # whole job before any step runs. The test factory connects to
      # localhost:5432, database dittofs_test, postgres/postgres.
      - name: Start PostgreSQL (with pull retry)
        run: |
          pulled=false
          for attempt in 1 2 3 4 5; do
            if docker pull postgres:16; then
              pulled=true
              break
            fi
            echo "docker pull postgres:16 failed (attempt $attempt), retrying..."
            sleep $((attempt * 5))
          done
          if [ "$pulled" != "true" ]; then
            echo "docker pull postgres:16 failed after 5 attempts"
            exit 1
          fi
          docker run -d --name dittofs-postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=dittofs_test \
            -p 5432:5432 \
            --health-cmd "pg_isready -U postgres" \
            --health-interval 5s \
            --health-timeout 5s \
            --health-retries 10 \
            postgres:16
          # Wait for the container to report healthy before running tests.
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' dittofs-postgres 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "PostgreSQL is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "PostgreSQL did not become healthy in time"
              docker logs dittofs-postgres
              exit 1
            fi
            sleep 2
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true  # Built-in caching (replaces actions/cache)

      - name: Download dependencies
        run: go mod download

      # -p 1 serializes package test binaries: several packages (metadata
      # store conformance, blockstore engine drain) share the single
      # dittofs_test database, and the conformance suite truncates it
      # between subtests — running their binaries concurrently would race.
      - name: Run all integration tests
        env:
          DITTOFS_TEST_POSTGRES_DSN: "host=localhost port=5432 dbname=dittofs_test user=postgres password=postgres sslmode=disable"
        run: go test -tags=integration -v -timeout=20m -p 1 ./...

      - name: Install and start rpcbind
        run: |
          sudo apt-get update
          sudo apt-get install -y rpcbind
          sudo systemctl start rpcbind || sudo rpcbind

      - name: Run portmap system integration tests
        run: |
          # Tests RPC client against system rpcbind
          # Skips automatically if rpcbind unavailable or NFS already registered
          go test -tags=portmap_system -v -timeout=2m ./test/integration/portmap/...

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs-${{ matrix.go-version }}
          path: |
            /tmp/dittofs-*
          retention-days: 3
          if-no-files-found: ignore

# SMB Conformance Tests
#
# Runs Microsoft WPTS FileServer BVT + Samba smbtorture against the DittoFS
# SMB adapter.
#
# Tiered by EVENT, not by path. Shared code (e.g. a metadata store) can break
# SMB, so conformance runs on ALL non-docs PRs; path filters skip docs only.
#
#   WPTS BVT     presubmit: memory + postgres-s3; postsubmit/nightly: all 5.
#   smbtorture   presubmit: memory + badger-fs (run.sh has no *-s3 profile);
#                postsubmit/nightly: memory + memory-fs + badger-fs.
#   Kerberos     OFF presubmit — push-to-develop + nightly cron + dispatch only.

name: SMB Conformance Tests

on:
  push:
    branches: [develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.svg'
  pull_request:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.svg'
  schedule:
    - cron: '0 4 * * *'  # Nightly 4 AM UTC
  workflow_dispatch:
    inputs:
      profile:
        description: 'Storage profile to test'
        required: false
        default: 'memory'
        type: choice
        options:
          - memory
          - memory-fs
          - badger-fs
          - badger-s3
          - postgres-s3

concurrency:
  group: smb-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smb-conformance:
    name: WPTS BVT / ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # presubmit: memory + postgres-s3 (run in parallel ≈ one profile
        # wall-clock); postsubmit + nightly: all 5 profiles. workflow_dispatch
        # runs the single chosen profile.
        profile: >-
          ${{
            github.event_name == 'workflow_dispatch'
              && fromJson(format('["{0}"]', inputs.profile))
            || github.event_name == 'pull_request'
              && fromJson('["memory", "postgres-s3"]')
            || fromJson('["memory", "memory-fs", "badger-fs", "badger-s3", "postgres-s3"]')
          }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y xmlstarlet gettext-base

      - name: Run SMB conformance tests
        run: |
          cd test/smb-conformance
          ./run.sh --profile ${{ matrix.profile }} --verbose

      - name: Add step summary
        if: always()
        run: |
          RESULTS_DIR=$(ls -td test/smb-conformance/results/*/ 2>/dev/null | head -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "## SMB Conformance: ${{ matrix.profile }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No results directory found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TRX_FILE=$(find "$RESULTS_DIR" -name "*.trx" -type f 2>/dev/null | head -1)
          if [ -z "$TRX_FILE" ]; then
            echo "## SMB Conformance: ${{ matrix.profile }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No TRX results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          NS="http://microsoft.com/schemas/VisualStudio/TeamTest/2010"
          TOTAL=$(xmlstarlet sel -N t="$NS" -t -v "//t:Counters/@total" "$TRX_FILE" 2>/dev/null || echo "0")
          PASSED=$(xmlstarlet sel -N t="$NS" -t -v "//t:Counters/@passed" "$TRX_FILE" 2>/dev/null || echo "0")
          FAILED=$(xmlstarlet sel -N t="$NS" -t -v "//t:Counters/@failed" "$TRX_FILE" 2>/dev/null || echo "0")
          NOT_EXEC=$(xmlstarlet sel -N t="$NS" -t -v "//t:Counters/@notExecuted" "$TRX_FILE" 2>/dev/null || echo "0")

          {
            echo "## SMB Conformance: ${{ matrix.profile }}"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Total | ${TOTAL} |"
            echo "| Passed | ${PASSED} |"
            echo "| Failed | ${FAILED} |"
            echo "| Skipped | ${NOT_EXEC} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smb-conformance-${{ matrix.profile }}
          path: test/smb-conformance/results/
          retention-days: 30

  smbtorture:
    name: smbtorture / ${{ matrix.profile }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        # smbtorture run.sh supports only memory/memory-fs/badger-fs (no *-s3),
        # so presubmit pairs memory + badger-fs (parallel ≈ one profile). A
        # workflow_dispatch with an unsupported (*-s3) profile clamps to memory
        # rather than crashing run.sh.
        profile: >-
          ${{
            github.event_name == 'pull_request'
              && fromJson('["memory", "badger-fs"]')
            || github.event_name == 'workflow_dispatch'
              && contains(fromJson('["memory", "memory-fs", "badger-fs"]'), inputs.profile)
              && fromJson(format('["{0}"]', inputs.profile))
            || github.event_name == 'workflow_dispatch'
              && fromJson('["memory"]')
            || fromJson('["memory", "memory-fs", "badger-fs"]')
          }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smbtorture tests
        run: |
          cd test/smb-conformance/smbtorture
          ./run.sh --profile ${{ matrix.profile }} --verbose

      - name: Add step summary
        if: always()
        run: |
          RESULTS_DIR=$(ls -td test/smb-conformance/results/smbtorture-*/ 2>/dev/null | head -1 || true)
          if [ -n "$RESULTS_DIR" ] && [ -f "$RESULTS_DIR/summary.txt" ]; then
            echo "## smbtorture: ${{ matrix.profile }}" >> "$GITHUB_STEP_SUMMARY"
            cat "$RESULTS_DIR/summary.txt" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## smbtorture: ${{ matrix.profile }}" >> "$GITHUB_STEP_SUMMARY"
            echo "No results found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smbtorture-${{ matrix.profile }}
          path: test/smb-conformance/results/smbtorture-*/
          retention-days: 30

  smbtorture-baseline-refresh:
    name: smbtorture baseline refresh
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Nightly only. Regenerates test/smb-conformance/smbtorture/baseline-results.md
    # from a clean develop memory-profile run so the documentation snapshot can't
    # drift (it went 54->489 passed before #1300). NOT a CI gate — grading is done
    # against KNOWN_FAILURES.md by parse-results.sh; this is pure doc honesty.
    # Operates on develop explicitly because scheduled runs fire on the default
    # branch (main), not develop.
    if: github.event_name == 'schedule'
    permissions:
      contents: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          # GITHUB_TOKEN cannot bypass branch protection on develop. If that
          # branch requires PRs/reviews, set a PAT secret BASELINE_PUSH_TOKEN
          # (with bypass rights) and the push below will use it automatically.
          token: ${{ secrets.BASELINE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run smbtorture (memory profile)
        run: |
          cd test/smb-conformance/smbtorture
          # Generation must not hinge on the run's exit status (which is the
          # known-failure count); we want the parsed output regardless.
          ./run.sh --profile memory --verbose || true

      - name: Regenerate baseline-results.md
        run: |
          cd test/smb-conformance/smbtorture
          RESULTS_DIR=$(ls -td ../results/smbtorture-*/ 2>/dev/null | head -1 || true)
          if [ -z "$RESULTS_DIR" ] || [ ! -f "$RESULTS_DIR/smbtorture-output.txt" ]; then
            echo "No smbtorture output produced; skipping baseline refresh."
            exit 0
          fi
          BASELINE_PROFILE=memory \
          BASELINE_COMMIT="$(git rev-parse --short HEAD)" \
          BASELINE_PLATFORM="$(uname -sm) (GitHub Actions runner)" \
            ./parse-results.sh --emit-baseline \
              "$RESULTS_DIR/smbtorture-output.txt" KNOWN_FAILURES.md > baseline-results.md

      - name: Commit and push if changed
        run: |
          BASELINE=test/smb-conformance/smbtorture/baseline-results.md
          if git diff --quiet -- "$BASELINE"; then
            echo "baseline-results.md unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BASELINE"
          git commit -m "docs(smb-conformance): refresh smbtorture baseline-results.md [skip ci]"
          # A PR may merge to develop during the run; rebase the lone baseline
          # commit on top of it so the push fast-forwards instead of reddening
          # the job on a non-fast-forward rejection.
          git pull --rebase origin develop
          git push origin HEAD:develop

  smbtorture-kerberos:
    name: smbtorture Kerberos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # OFF presubmit: Kerberos is expensive and rarely the regressing surface on
    # an ordinary PR. Runs on push-to-develop, nightly cron, and manual dispatch.
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The self-contained KDC (test/smb-conformance/kdc) is started via
      # the docker-compose "kerberos" profile by run.sh --kerberos. No
      # external KDC or secrets required.
      #
      # Filters cover the krb-sensitive ops, not just session setup: a
      # truncated/garbled GSS session key surfaces on read/lock too.
      # run.sh takes a single --filter, so iterate (one suite per invocation)
      # to keep each run inside the harness's per-suite timeout budget.
      #
      # smb2.create is intentionally excluded: its known failures are catalogued
      # only in the non-Kerberos KNOWN_FAILURES.md, so it would grade as NEW
      # failures under --kerberos. Re-add once a Kerberos KF list covers it.
      - name: Run smbtorture with Kerberos
        run: |
          cd test/smb-conformance/smbtorture
          rc=0
          for f in smb2.session smb2.read smb2.lock; do
            ./run.sh --kerberos --filter "$f" --verbose || rc=$?
          done
          exit "$rc"

      - name: Add step summary
        if: always()
        run: |
          RESULTS_DIR=$(ls -td test/smb-conformance/results/smbtorture-*/ 2>/dev/null | head -1 || true)
          if [ -n "$RESULTS_DIR" ] && [ -f "$RESULTS_DIR/summary.txt" ]; then
            echo "## smbtorture Kerberos" >> "$GITHUB_STEP_SUMMARY"
            cat "$RESULTS_DIR/summary.txt" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## smbtorture Kerberos" >> "$GITHUB_STEP_SUMMARY"
            echo "No results found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smbtorture-kerberos
          path: test/smb-conformance/results/smbtorture-*/
          retention-days: 30

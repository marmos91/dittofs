# End-to-End Tests for DittoFS
#
# Tests aspects NOT covered by pjdfstest POSIX compliance:
# - Scalability (large files, many files)
# - Store interoperability (all 8 configurations)
# - Protocol interoperability (NFS and SMB cross-protocol)
# - Cache behavior
# - Server configurations
# - SMB3 client tests (go-smb2, smbclient, Kerberos)
#
# See test/e2e/README.md for test philosophy and structure.

name: E2E Tests

# The full suite takes ~45-75m, so it is NOT run per-PR (that would make every
# PR slow). It runs only on push to develop/main and nightly — develop is the
# gate. A red develop run fires the ci-health email + P0 develop-red issue, and
# warn-on-pr flags open PRs, forcing a fix-forward. Run manually on a PR with
# workflow_dispatch when needed.

on:
  push:
    branches: [develop, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.svg'
  schedule:
    # Nightly at 4 AM UTC.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # The suite runs `go test -timeout 30m`, plus a cold fetch+compile of the
    # e2e-only test deps under sudo. 20m was only ever enough because the job
    # was a no-op (go test never ran); a real run needs headroom past the 30m
    # test timeout itself.
    timeout-minutes: 75

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dittofs
          POSTGRES_PASSWORD: dittofs
          POSTGRES_DB: dittofs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      localstack:
        image: localstack/localstack:4.13.1
        env:
          SERVICES: s3
          EAGER_SERVICE_LOADING: "1"
          GATEWAY_LISTEN: "0.0.0.0:4566"
          DISABLE_CORS_CHECKS: "1"
          DISABLE_CUSTOM_CORS_S3: "1"
          DEBUG: "0"
          LOCALSTACK_HOST: localhost:4566
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf https://localhost:4566/_localstack/health -k || curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tell tests to use pre-existing services instead of starting containers
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: dittofs_test
      POSTGRES_USER: dittofs
      POSTGRES_PASSWORD: dittofs
      LOCALSTACK_ENDPOINT: http://localhost:4566

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y nfs-common cifs-utils smbclient krb5-user
          # Start rpc-gssd for Kerberos NFS tests
          sudo systemctl start rpc-gssd || true

      - name: Build DittoFS
        run: nix develop .#ci --command go build -o dfs cmd/dfs/main.go

      - name: Run E2E tests
        run: |
          set -o pipefail
          # Full mode: all configurations including Docker-based stores.
          # sudo resolves commands via secure_path (which omits the Nix profile),
          # so `nix` was "command not found" under sudo and go test never ran.
          # Pass the caller's PATH through so `nix` resolves; keep -E for the
          # external-service env vars the suite reads. pipefail is required so the
          # go-test exit code propagates through `tee` — without it the job was a
          # false-green no-op regardless of whether the tests ran or passed.
          sudo -E env "PATH=$PATH" nix develop .#ci --command \
            go test -tags=e2e -v -timeout 30m ./test/e2e/... \
            2>&1 | tee "$GITHUB_WORKSPACE/e2e.log"

      - name: Generate summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -qE "^ok[[:space:]]" "$GITHUB_WORKSPACE/e2e.log" && ! grep -qE "^FAIL" "$GITHUB_WORKSPACE/e2e.log"; then
            echo ":white_check_mark: All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo ":x: Some tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for suite in Server Users Groups Shares Permissions MetadataStores BlockStores Adapters Portmapper Backup Context FileOperations CrossProtocol StoreMatrix Kerberos SMB3 SMB3_Kerberos; do
            if grep -q "Test${suite}.*PASS" "$GITHUB_WORKSPACE/e2e.log"; then
              echo "| ${suite} | :white_check_mark: |" >> $GITHUB_STEP_SUMMARY
            elif grep -q "Test${suite}.*FAIL" "$GITHUB_WORKSPACE/e2e.log"; then
              echo "| ${suite} | :x: |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${suite} | :grey_question: |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full Test Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat "$GITHUB_WORKSPACE/e2e.log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: ${{ github.workspace }}/e2e.log
          retention-days: 30

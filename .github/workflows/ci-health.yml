# CI Health — develop-red flake self-heal + PR warning
#
# Alerting (P0 develop-red issue + email) was removed: it produced a flood of
# mails/issues on flaky conformance runs. The only alarm surface now is a
# warn-only comment on PRs.
#
# Two responsibilities:
#
#   retry (workflow_run): when a conformance workflow's first attempt fails a
#     POSTSUBMIT or PERIODIC run on develop (push or schedule — NOT a PR run),
#     re-run its failed jobs once so a transient flake self-heals to green with
#     no human touch. No paging.
#
#   warn-on-pr (pull_request): if develop is currently RED (any monitored
#     conformance workflow's latest completed develop run failed), post/update a
#     single loud (warn-only, non-blocking) comment on the PR; clear it on green.

name: CI Health

on:
  workflow_run:
    workflows:
      - "POSIX Compliance Tests"
      - "SMB Conformance Tests"
      - "E2E Tests"
      - "NFS Kerberos"
    types: [completed]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Flake self-heal: re-run a red conformance run's failed jobs once.
  # Only postsubmit/periodic runs (push or schedule on develop) qualify, and
  # only the first attempt — attempt 2 is left as the final word.
  # `cancelled` is excluded: conformance workflows set cancel-in-progress, so a
  # newer develop push cancels the in-flight run (benign; the superseding run
  # reports the true status).
  # ---------------------------------------------------------------------------
  retry:
    name: retry conformance flake
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'develop' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'schedule') &&
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.conclusion != 'cancelled' &&
      github.event.workflow_run.run_attempt == 1
    permissions:
      contents: read
      actions: write
    steps:
      - name: Re-run failed jobs once
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          echo "Attempt 1 of ${WORKFLOW} on develop is red; re-running failed jobs once."
          echo "A transient flake self-heals on attempt 2; a genuine break stays red (surfaced on PRs)."
          gh run rerun "$RUN_ID" --repo "$REPO" --failed \
            || echo "Re-run could not be queued; leaving the run as-is."

  # ---------------------------------------------------------------------------
  # Forcing function (warn-only): if develop is currently RED, warn on the PR.
  # Idempotent via a hidden marker so the same comment is updated, not stacked.
  # ---------------------------------------------------------------------------
  warn-on-pr:
    name: warn if develop is red
    runs-on: ubuntu-latest
    # Same-repo PRs only: fork PRs get a read-only GITHUB_TOKEN, so commenting
    # would fail and turn this warn-only check into a red job.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    # PR comments are posted via the `/issues/{pr}/comments` endpoint, which is
    # authorized by `issues: write` — not `pull-requests: write`. `actions: read`
    # is for the `gh run list` develop-status queries.
    permissions:
      contents: read
      actions: read
      issues: write

    steps:
      - name: Post/update develop-red warning
        # Warn-only: never let a GitHub API/CLI hiccup turn this into a red check.
        # Individual gh calls are made best-effort; the step always exits 0.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- ci-health:develop-red-warning -->"

          # develop is RED if any monitored conformance workflow's latest
          # completed run on develop failed. `none` (never ran) and `cancelled`
          # (concurrency-superseded) are benign — treated as not-red.
          RED=""
          for wf in posix-tests.yml smb-conformance.yml e2e-tests.yml nfs-kerberos.yml; do
            CONC=$(gh run list --repo "$REPO" --workflow "$wf" --branch develop \
              --status completed -L 1 --json conclusion --jq '.[0].conclusion // "none"' \
              || echo "none")
            echo "  $wf -> $CONC"
            if [ "$CONC" != "success" ] && [ "$CONC" != "none" ] && [ "$CONC" != "cancelled" ]; then
              RED="$RED $wf"
            fi
          done

          # Find any existing bot warning comment by its hidden marker.
          # --paginate walks all pages so a stale marker is never missed (which
          # would otherwise post a duplicate comment each run).
          EXISTING_COMMENT=$(gh api --paginate "repos/$REPO/issues/$PR/comments?per_page=100" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" 2>/dev/null | head -n1 || true)

          if [ -z "$RED" ]; then
            echo "develop is green; no warning needed."
            if [ -n "$EXISTING_COMMENT" ]; then
              CLEARED=$(printf '%s\n✅ develop is green again — earlier warning cleared.' "$MARKER")
              gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING_COMMENT" \
                -f body="$CLEARED" >/dev/null || echo "warn-only: could not clear comment (non-blocking)."
              echo "Cleared stale warning comment $EXISTING_COMMENT"
            fi
            exit 0
          fi

          BODY=$(printf '%s\n⚠️ **develop is currently RED** (failing:%s). Your PR builds on a broken base — fix/await develop before merging. (Warning only; this does not block the merge.)' "$MARKER" "$RED")

          if [ -n "$EXISTING_COMMENT" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$EXISTING_COMMENT" \
              -f body="$BODY" >/dev/null || echo "warn-only: could not update comment (non-blocking)."
            echo "Updated existing warning comment $EXISTING_COMMENT"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" \
              -f body="$BODY" >/dev/null || echo "warn-only: could not post comment (non-blocking)."
            echo "Posted new warning comment"
          fi

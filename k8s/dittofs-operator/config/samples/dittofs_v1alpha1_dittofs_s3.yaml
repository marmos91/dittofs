apiVersion: dittofs.dittofs.com/v1alpha1
kind: DittoServer
metadata:
  name: dittofs-s3-sample
  namespace: dittofs
spec:
  image: marmos91c/dittofs:latest
  replicas: 1
  storage:
    metadataSize: "10Gi"
    cacheSize: "5Gi"
    # No contentSize needed - using S3 for payload
  identity:
    jwt:
      secretRef:
        name: dittofs-jwt-secret
        key: secret
    admin:
      username: admin
      passwordSecretRef:
        name: dittofs-admin-secret
        key: password-hash
# After this DittoServer is Ready, create S3-backed stores via the REST API:
#
#   dfsctl store block remote add --name s3-content --type s3 \
#     --config '{"bucket":"dittofs-data","region":"eu-west-1","access_key_id":"AKIA...","secret_access_key":"..."}'
#
# Each store carries its own credentials; the operator does not inject AWS env vars.

# DittoFS Operator Helm Chart Values
# See https://github.com/marmos91/dittofs for documentation

# Controller Manager configuration
controllerManager:
  manager:
    args:
      - --metrics-bind-address=:8443
      - --leader-elect
      - --health-probe-bind-address=:8081
    # Enable admission webhooks. Disabled by default: the chart does not yet
    # provision a webhook TLS certificate, and enabling webhooks without one
    # crash-loops the manager. Set to true only once cert wiring is in place.
    enableWebhooks: false
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    image:
      repository: marmos91c/dittofs-operator
      tag: latest
      # Overrides the image tag whose default is the chart appVersion
      # tag: ""
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi

  # Node selector for controller pods
  nodeSelector: {}

  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # Number of controller replicas (1 recommended with leader election)
  replicas: 1

  # Tolerations for controller pods
  tolerations: []

  # Topology spread constraints
  topologySpreadConstraints: []

# Kubernetes cluster domain (for service DNS)
kubernetesClusterDomain: cluster.local

# Metrics service configuration
metricsService:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: 8443
  type: ClusterIP

# Prometheus integration for DittoServer instances.
#
# IMPORTANT: this chart installs the OPERATOR, not DittoServer instances. The
# DittoFS metrics surface is configured per-DittoServer via its `spec.metrics`
# block (see the CRD / docs/CONFIGURATION.md). The settings below are NOT applied
# automatically — they document the recommended shape and let downstream
# automation template a DittoServer.spec.metrics from one place.
#
# Ownership model: DittoFS only exposes a scrape target plus optional integration
# glue (a metrics Service with prometheus.io/* annotations and an optional
# ServiceMonitor). It never runs or bundles Prometheus/Thanos — rely on the
# cluster's prometheus-operator (e.g. kube-prometheus-stack). The ServiceMonitor
# is emitted ONLY when the monitoring.coreos.com CRDs are present AND
# serviceMonitor.enabled is true; otherwise it is skipped without error.
metrics:
  # Enable the DittoFS /metrics endpoint, the metrics Service, and the
  # prometheus.io/scrape annotations on DittoServer instances. Opt-in.
  enabled: false
  # Metrics endpoint / Service port.
  port: 9090
  # Metrics HTTP path.
  path: /metrics
  serviceMonitor:
    # Emit a monitoring.coreos.com/v1 ServiceMonitor (requires the
    # prometheus-operator CRDs; skipped at reconcile time if absent).
    enabled: false
    # Scrape interval; empty uses the Prometheus default.
    interval: ""
    # Labels added to the ServiceMonitor so a Prometheus serviceMonitorSelector
    # can match it, e.g. {release: kube-prometheus-stack}.
    labels: {}

# Service account configuration
serviceAccount:
  annotations: {}
  automount: true
  create: true
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# GoReleaser configuration for DittoFS
# Documentation: https://goreleaser.com

version: 2

before:
  hooks:
    # Ensure dependencies are up to date
    - go mod tidy
    # Run tests before building
    - go test -short ./...

builds:
  - id: dfs
    main: ./cmd/dfs/main.go
    binary: dfs

    env:
      - CGO_ENABLED=0  # Static binaries

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64
      - arm

    goarm:
      - "7"  # ARMv7 for Raspberry Pi, etc.

    # Ignore combinations that don't make sense
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

    ldflags:
      # Inject version info
      - -s -w  # Strip debug info
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

  - id: dfsctl
    main: ./cmd/dfsctl/main.go
    binary: dfsctl

    env:
      - CGO_ENABLED=0  # Static binaries

    goos:
      - linux
      - darwin
      - windows

    goarch:
      - amd64
      - arm64
      - arm

    goarm:
      - "7"  # ARMv7 for Raspberry Pi, etc.

    # Ignore combinations that don't make sense
    ignore:
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm

    ldflags:
      # Inject version info
      - -s -w  # Strip debug info
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser

archives:
  - id: dfs-archive
    ids:
      - dfs
    name_template: >-
      dfs_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    format_overrides:
      - goos: windows
        formats: [zip]

    files:
      - README.md
      - LICENSE

  - id: dfsctl-archive
    ids:
      - dfsctl
    name_template: >-
      dfsctl_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

    format_overrides:
      - goos: windows
        formats: [zip]

    files:
      - README.md
      - LICENSE

# Native Linux packages (deb, rpm, archlinux)
nfpms:
  - id: dfs
    ids: [dfs]
    package_name: dfs
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    vendor: Marco Moschettini
    homepage: https://github.com/marmos91/dittofs
    maintainer: Marco Moschettini <marco@marmos91.dev>
    description: DittoFS server daemon — modular virtual filesystem with pluggable storage backends
    license: MIT
    formats: [deb, rpm, archlinux]
    bindir: /usr/local/bin
    contents:
      - src: packaging/dfs.service
        dst: /usr/lib/systemd/system/dfs.service
    scripts:
      postinstall: packaging/postinstall.sh
      preremove: packaging/preremove.sh
      postremove: packaging/postremove.sh

  - id: dfsctl
    ids: [dfsctl]
    package_name: dfsctl
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Arch }}"
    vendor: Marco Moschettini
    homepage: https://github.com/marmos91/dittofs
    maintainer: Marco Moschettini <marco@marmos91.dev>
    description: DittoFS CLI client — remote management for DittoFS servers
    license: MIT
    formats: [deb, rpm, archlinux]
    bindir: /usr/local/bin

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - merges
  groups:
    - title: Features
      regexp: '^.*?feat(\([\w-]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([\w-]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([\w-]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

# Docker images (v2 — multi-arch via buildx)
dockers_v2:
  - id: dfs
    ids:
      - dfs
    images:
      - "marmos91c/dittofs"
    tags:
      - "{{ .Tag }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
      - "{{ if not .Prerelease }}v{{ .Major }}{{ end }}"
      - "{{ if not .Prerelease }}v{{ .Major }}.{{ .Minor }}{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile.goreleaser
    labels:
      "org.opencontainers.image.title": "DittoFS"
      "org.opencontainers.image.description": "Modular virtual filesystem with pluggable storage backends"
      "org.opencontainers.image.url": "https://github.com/marmos91/dittofs"
      "org.opencontainers.image.source": "https://github.com/marmos91/dittofs"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.licenses": "MIT"

# Homebrew cask distribution
homebrew_casks:
  - name: dfs
    ids:
      - dfs-archive
    binaries:
      - dfs
    directory: Casks
    repository:
      owner: marmos91
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "Brew cask update for dfs version {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/marmos91/dittofs"
    description: "DittoFS server daemon — modular virtual filesystem with pluggable storage backends"
    skip_upload: auto

  - name: dfsctl
    ids:
      - dfsctl-archive
    binaries:
      - dfsctl
    directory: Casks
    repository:
      owner: marmos91
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "Brew cask update for dfsctl version {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/marmos91/dittofs"
    description: "DittoFS CLI client — remote management for DittoFS servers"
    skip_upload: auto

# Scoop bucket manifests for Windows distribution
scoops:
  - name: dfs
    ids:
      - dfs-archive
    repository:
      owner: marmos91
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_msg_template: "Scoop update for dfs version {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/marmos91/dittofs"
    description: "DittoFS server daemon — modular virtual filesystem with pluggable storage backends"
    license: "MIT"
    skip_upload: auto

  - name: dfsctl
    ids:
      - dfsctl-archive
    repository:
      owner: marmos91
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_msg_template: "Scoop update for dfsctl version {{ .Tag }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/marmos91/dittofs"
    description: "DittoFS CLI client — remote management for DittoFS servers"
    license: "MIT"
    skip_upload: auto

release:
  github:
    owner: marmos91
    name: dittofs

  # Prerelease detection
  prerelease: auto

  # Release notes
  header: |
    ## DittoFS {{ .Tag }}

    A modular virtual filesystem that decouples file interfaces from storage backends.

    ### Installation

    **Quick install (macOS / Linux):**
    ```bash
    curl -fsSL https://github.com/marmos91/dittofs/releases/download/{{ .Tag }}/install.sh | sh
    ```

    **Homebrew (macOS/Linux):**
    ```bash
    brew tap marmos91/tap
    brew install marmos91/tap/dfs      # Server daemon
    brew install marmos91/tap/dfsctl   # Client CLI
    ```

    **Debian/Ubuntu (APT):**
    ```bash
    curl -fsSL https://s3.cubbit.eu/dittofs-binaries/apt/dittofs.gpg.key | gpg --dearmor --yes | sudo tee /usr/share/keyrings/dittofs.gpg > /dev/null
    echo "deb [signed-by=/usr/share/keyrings/dittofs.gpg] https://s3.cubbit.eu/dittofs-binaries/apt stable main" | sudo tee /etc/apt/sources.list.d/dfs.list
    sudo apt update && sudo apt install dfs
    sudo systemctl enable --now dfs
    ```

    **RHEL/Fedora (YUM):**
    ```bash
    sudo curl -fsSLo /etc/yum.repos.d/dfs.repo https://s3.cubbit.eu/dittofs-binaries/rpm/dfs.repo
    sudo yum install dfs
    sudo systemctl enable --now dfs
    ```

    **Arch Linux:**
    ```bash
    curl -fsSLO https://github.com/marmos91/dittofs/releases/download/{{ .Tag }}/dfs_{{ .Version }}_amd64.pkg.tar.zst
    sudo pacman -U dfs_{{ .Version }}_amd64.pkg.tar.zst
    sudo systemctl enable --now dfs
    ```

    **Scoop (Windows):**
    ```powershell
    scoop bucket add marmos91 https://github.com/marmos91/scoop-bucket
    scoop install dfs       # Server daemon
    scoop install dfsctl    # Client CLI
    ```

    **Docker:**
    ```bash
    docker run -d \
      -p 12049:12049 \
      -p 12445:12445 \
      -p 8080:8080 \
      -v /path/to/config.yaml:/config/config.yaml:ro \
      -v dittofs-data:/data \
      marmos91c/dittofs:{{ .Tag }}
    ```

    **Binary Download:**
    ```bash
    # dfs (server daemon)
    curl -sfL https://github.com/marmos91/dittofs/releases/download/{{ .Tag }}/dfs_{{ .Version }}_Linux_x86_64.tar.gz | tar xz

    # dfsctl (client CLI)
    curl -sfL https://github.com/marmos91/dittofs/releases/download/{{ .Tag }}/dfsctl_{{ .Version }}_Linux_x86_64.tar.gz | tar xz
    ```
  extra_files:
    - glob: scripts/install.sh

  footer: |
    ---

    **Full Changelog**: https://github.com/marmos91/dittofs/compare/{{ .PreviousTag }}...{{ .Tag }}

    ### Verifying Checksums

    ```bash
    sha256sum -c checksums.txt
    ```

    ### Docker Images

    Multi-architecture images are available for `linux/amd64` and `linux/arm64`:
    - `marmos91c/dittofs:{{ .Tag }}` - This specific version
    - `marmos91c/dittofs:latest` - Latest stable release
    - `marmos91c/dittofs:v{{ .Major }}` - Latest v{{ .Major }}.x.x
    - `marmos91c/dittofs:v{{ .Major }}.{{ .Minor }}` - Latest v{{ .Major }}.{{ .Minor }}.x
